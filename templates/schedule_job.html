{% extends "base.html" %}
{% block content %}

<div class="mt-4">
    <h2 class="mt-5">Schedule Job</h2>

    <form action="" method="post">
        <div class="form-group">
            <label for="customer">Select Customer:</label>
            <select class="form-control" name="customer" id="customer" required>
                <option value="">---Select---</option>
                {% for customer in customers %}
                <option value="{{ customer[0] }}">{% if customer[1] %}{{ customer[1] }}{% endif %} {% if customer[2] %}{{ customer[2] }}{% endif %}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="date">Date for the job:</label>
            <input type="date" class="form-control" id="date" min="{{ today }}" name="date" required>
        </div>
        <button type="submit" class="btn btn-primary mt-4">Book Job</button>
    </form>
</div>

{% endblock %}
