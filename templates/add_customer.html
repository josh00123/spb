{% extends "base.html" %}
{% block content %}

<div class="mt-4">
    <h2 class="mb-4">Add New Customer</h2>

    <form action="{{ url_for('add_customer') }}" method="post">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" placeholder="First Name" required class="form-control">
            <div class="invalid-feedback">
                Please provide a valid first name.
            </div>
        </div>

        <div class="form-group">
            <label for="family_name">Surname</label>
            <input type="text" name="family_name" id="family_name" placeholder="Surname" required class="form-control">
            <div class="invalid-feedback">
                Please provide a valid surname.
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Email" required class="form-control">
            <div class="invalid-feedback">
                Please provide a valid email.
            </div>
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="number" step="1" name="phone" id="phone" placeholder="Phone" required class="form-control">
            <div class="invalid-feedback">
                Please provide a valid phone number.
            </div>
        </div>

        <button type="submit" class="btn btn-primary mt-4">Add Customer</button>
    </form>
</div>

{% endblock %}
