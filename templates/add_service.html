{% extends "base.html" %}
{% block content %}

<div class="mt-4">
    <h2 class="mb-4">Add New Service</h2>

    <form action="{{ url_for('service') }}" method="post">
        <div class="form-group mb-2">
            <label for="service_name">Service Name</label>
            <input type="text" name="service_name" id="service_name" placeholder="Service Name" required
                class="form-control">
            <div class="invalid-feedback">
                Please provide a valid service name.
            </div>
        </div>

        <div class="form-group">
            <label for="service_cost">Service Cost</label>
            <input type="number" name="service_cost" id="service_cost" placeholder="Service Cost" required
                class="form-control">
            <div class="invalid-feedback">
                Please provide a valid cost.
            </div>
        </div>

        <button type="submit" class="btn btn-primary mt-4">Add Service</button>
    </form>
</div>

{% endblock %}
