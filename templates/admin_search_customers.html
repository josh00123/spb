{% extends "base.html" %}
{% block content %}

<h2>Search Customers</h2>

<form action="{{ url_for('search_customers') }}" method="post">
    <input type="text" name="search_term" placeholder="Search by first name or surname" required>
    <input type="submit" value="Search">
</form>

<table>
    <tr>
        <th>Customer ID</th>
        <th>First Name</th>
        <th>Surname</th>
    </tr>
    {% for customer in customers %}
        <tr>
            <td>{{ customer.customer_id }}</td>
            <td>{{ customer.first_name }}</td>
            <td>{{ customer.family_name }}</td>
        </tr>
    {% endfor %}
</table>

{% endblock %}
